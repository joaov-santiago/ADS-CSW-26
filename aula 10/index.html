<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>

<body>

<h2>Formulario</h2>

<form action="#" method="post" enctype="multipart/form-data">
<table border="1" cellpadding="6" cellspacing="0">

    <tr>
        <td>Nome:</td>
        <td><input type="text" placeholder="Digite seu nome"></td>
    </tr>

    <tr>
        <td>E-mail pessoal:</td>
        <td><input type="email"></td>
    </tr>

    <tr>
        <td>E-mail (pattern):</td>
        <td><input type="email" placeholder="Digite seu email com @"></td>
    </tr>

    <tr>
        <td>Senha:</td>
        <td><input type="password"></td>
    </tr>

    <tr>
        <td>Idade:</td>
        <td><input type="number" style="width:60px;"></td>
    </tr>

    <tr>
        <td colspan="2">
            Deixe um comentário:<br><br>
            <textarea rows="6" cols="60"></textarea>
        </td>
    </tr>

    <tr>
        <td>
            Materia de interesse:<br>
            <input type="checkbox"> Backend<br>
            <input type="checkbox"> FrontEnd<br>
            <input type="checkbox"> FullStack
        </td>

        <td>
            Tipo de Viagem:<br>
            <input type="radio" name="viagem"> Negócios<br>
            <input type="radio" name="viagem"> Lazer<br>
            <input type="radio" name="viagem"> Turismo<br>
            <input type="radio" name="viagem"> Acadêmico
        </td>
    </tr>

    <tr>
        <td>
            Esporte favorito:<br>
            <select size="4">
                <option>Futebol</option>
                <option>Basquete</option>
                <option>Vôlei</option>
                <option>Tênis</option>
            </select>
        </td>

        <td>
            Investimentos:<br>
            <select>
                <option>Poupança</option>
                <option>Criptomoedas</option>
                <option>Ações</option>
                <option>Fundos</option>
            </select>
        </td>
    </tr>

    <tr>
        <td>
            Escolha uma cor:<br>
            <input type="color">
        </td>

        <td>
            Selecione um arquivo:<br>
            <input type="file">
        </td>
    </tr>

    <tr>
        <td colspan="2">
            Data e Hora envio:
            <input type="datetime-local">
        </td>
    </tr>

    <tr>
        <td colspan="2" style="text-align:left;">
            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </td>
    </tr>

</table>
</form>

</body>
</html>
